<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | 3D Elite</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* Smooth Content Overlay */
        .content {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: radial-gradient(circle, transparent 20%, #000 150%);
        }

        h1 { font-size: 8vw; letter-spacing: 15px; margin: 0; text-transform: uppercase; font-weight: 900; opacity: 0.8; }
        p { font-size: 1.5vw; letter-spacing: 5px; color: #00d2ff; }

        .glass-ui {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px; transition: 0.5s;
        }
        .glass-ui:hover { border-color: #00d2ff; transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="content">
        <h1>NEXUS AI</h1>
        <p>3D AUTONOMOUS INTERFACE</p>
        
        <div class="glass-ui">
            <input type="text" id="userName" placeholder="IDENTITY NAME" style="background:transparent; border:none; border-bottom: 2px solid #333; color:#fff; padding:10px; width:250px; outline:none; text-align:center;">
            <br><br>
            <button onclick="alert('Access Granted')" style="background:#00d2ff; border:none; padding:15px 40px; border-radius:50px; font-weight:bold; cursor:pointer;">INITIALIZE</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js Scene Setup for that "Sébastien" vibe
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
        const material = new THREE.MeshPhongMaterial({ color: 0x00d2ff, wireframe: true });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);

        const light = new THREE.PointLight(0xffffff);
        light.position.set(5, 5, 5);
        scene.add(light);
        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.01;
            torus.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
